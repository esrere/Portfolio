       id="text1"
       style="font-size:18.6667px;text-align:start;writing-mode:lr-tb;direction:ltr;white-space:pre;shape-inside:url(#rect1);display:inline;fill:#ffc9c9;stroke:#2a2a2a"><tspan
         x="118.81836"
         y="823.43254"
         id="tspan3"><tspan
           style="font-family:'Cambria Math';-inkscape-font-specification:'Cambria Math';fill:#000000"
           id="tspan2">Mūsu uzņēmuma pamatvērtības is kvlaitatīvas un dabīgas </tspan></tspan><tspan
         x="118.81836"
         y="846.94322"
         id="tspan5"><tspan
           style="font-family:'Cambria Math';-inkscape-font-specification:'Cambria Math';fill:#000000"
           id="tspan4">izejvielas, tāpēc logo izmantojam roza toni, kurš ir arī mūsu </tspan></tspan><tspan
         x="118.81836"
         y="870.4539"
         id="tspan7"><tspan
           style="font-family:'Cambria Math';-inkscape-font-specification:'Cambria Math';fill:#000000"
           id="tspan6">vispopulārākās &quot;Svaigo zemeņu kūkas&quot; krēma tonis. Mēs esam </tspan></tspan><tspan
         x="118.81836"
         y="893.96458"
         id="tspan9"><tspan
           style="font-family:'Cambria Math';-inkscape-font-specification:'Cambria Math';fill:#000000"
           id="tspan8">gimenes uzņēmums, tāpēc izjūtu augstu atbildības sajūtu un </tspan></tspan><tspan
         x="118.81836"
         y="917.47527"
         id="tspan11"><tspan
           style="font-family:'Cambria Math';-inkscape-font-specification:'Cambria Math';fill:#000000"
           id="tspan10">mīlestību pret darbu, ko darām. Mūsu kūkas tiek radītas, </tspan></tspan><tspan
         x="118.81836"
         y="940.98595"
         id="tspan13"><tspan
           style="font-family:'Cambria Math';-inkscape-font-specification:'Cambria Math';fill:#000000"
           id="tspan12">izmantojot ilgstoši pieslīpētas receptes, lai tām būtu pati labākā </tspan></tspan><tspan
         x="118.81836"
         y="964.49663"
         id="tspan15"><tspan
           style="font-family:'Cambria Math';-inkscape-font-specification:'Cambria Math';fill:#000000"
           id="tspan14">garša. Robiņi mūsu logo sakrīt ar uzņēmuma pastāvēšanas gadiem </tspan></tspan><tspan
         x="118.81836"
         y="988.00731"
         id="tspan17"><tspan
           style="font-family:'Cambria Math';-inkscape-font-specification:'Cambria Math';fill:#000000"
           id="tspan16">(44), kopš vecmāmiņa Irēna atvēra kūku veikalu Balvos. </tspan></tspan></text>
