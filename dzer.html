	<h1>Vienas izvēles pogas piemērs</h1>
	<p>Izvēlies vienu dzērienu:</p>
	<form>
	  <input type="radio" name="drink" value="3.60"> kafija<br>
	  <input type="radio" name="drink" value="2.50"> sula<br>
	  <input type="radio" name="drink" value="3.20"> kakao<br>
	  <input type="radio" name="drink" value="2.20"> tēja<br><br>
	
	  <input type="button" value="jāmaksā" onclick="maksaRadio()">
	</form>
	<p id="price"></p>
	<script>
	function maksaRadio(){
		let dz = document.getElementsByName('drink');
	
	    for(let i = 0; i < dz.length; i++) {
	       if(dz[i].checked){
	          document.getElementById("price").innerHTML = "Jāmaksā " + dz[i].value;
	          return;
	       }
		}
	}
</script>
