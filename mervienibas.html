<html>
    <head>
        <title>Mērvienības</title>
        <style>
            body {
                background-image: url("images/cipari.jpg");
            }
            form {
                font-size: 20px;
                background-color: rgb(220, 220, 0);
            }
        </style>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <h1>Informācijas daudzuma mērvienības</h1>
        <form name="merv">
            <p>
                <input type="text" name="gb"> GB=
            </p>
            
            <p>
                <input type="button" value="Izteikt megabaitos" onclick="aprekinatMB();">
                <input type="text" name="mb"> MB
            </p>
            
            <p>
                <input type="button" value="Izteikt mibibaitos" onclick="aprekinatMiB();">
                <input type="text" name="mib"> MiB
            </p>
        </form>
        <script>
            function aprekinatMB() {
                let gb = parseFloat(document.merv.gb.value);
                if(!isNaN(gb)) {
                    document.merv.mb.value = gb * 1000;
                }
            }
            function aprekinatMiB() {
                let gb = parseFloat(document.merv.gb.value);
                if(!isNaN(gb)) {
                    let mib = (gb * 1000 * 1000 * 1000) / (1024 * 1024);
                    document.merv.mib.value = mib.toFixed(2);
                }
            }
        </script>
    </body>
</html>
